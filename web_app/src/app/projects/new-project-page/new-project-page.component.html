<h3 class="text-2xl">New project</h3>
<form>
    <div class="my-3">
        <label class="block text-lg text-gray-300 mb-1">Name</label>
        <input type="text"
            class="w-full p-2 rounded bg-gray-800 text-gray-100 border border-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500" />
    </div>
    <div class="mb-3">
        <label class="block text-lg text-gray-300 mb-1">Description</label>
        <textarea
            class="w-full p-2 rounded bg-gray-800 text-gray-100 border border-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            rows="15"></textarea>
    </div>
    <button class="w-full p-2 rounded bg-blue-600 mt-5">Save</button>
</form>
