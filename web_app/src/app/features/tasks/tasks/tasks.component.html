<select [(ngModel)]="status" (change)="onStatusChange()" class="mt-5 block w-full px-4 py-2 rounded-lg
    bg-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    <option selected value="IDEA">idea</option>
    <option value="TODO">to do</option>
    <option value="IN_PROGRESS">in progress</option>
    <option value="Done">done</option>
</select>
<ul>
    @for (task of tasks(); track task.id) {
    <li class="p-3 my-2 bg-gray-800 rounded cursor-pointer hover:bg-gray-700 flex" [routerLink]="['/tasks/', task.id]">
        <div class="flex-1">{{ task.name }}</div>
    </li>
    }
</ul>
