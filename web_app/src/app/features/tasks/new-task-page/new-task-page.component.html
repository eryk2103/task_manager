<h3 class="form__title">New task</h3>
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
    <mat-form-field appearance="outline" class="form__field">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
        <mat-error>
            @if (name?.invalid && (name?.dirty || name?.touched)) {
            @if (name?.errors?.['required']) {
            Name is required
            }
            @if (name?.errors?.['minlength']) {
            Min 3 charecters
            }
            @if (name?.errors?.['maxLength']) {
            Max 200 characters
            }
            }
        </mat-error>
    </mat-form-field>
    <div class="form__actions">
        <button matButton="filled" class="w-full">Save</button>
        <button matButton="outlined" color="warn" class="w-full"
            [routerLink]="['/projects/', projectId]">Cancel</button>
    </div>
</form>
