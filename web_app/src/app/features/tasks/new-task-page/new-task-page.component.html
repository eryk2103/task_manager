<h3 class="text-2xl">New project</h3>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="my-5">
        <label for="name">Name</label>
        <input type="text"
            class="w-full p-2 rounded bg-gray-800 text-gray-100 border border-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            formControlName="name" id="name" />
    </div>
    <button type="submit" class="w-full p-2 rounded bg-blue-600 mt-5 cursor-pointer hover:bg-blue-700">Save</button>
    <button type="button" class="w-full p-2 rounded bg-gray-600 mt-5 cursor-pointer hover:bg-gray-700"
        [routerLink]="['/projects/', projectId]">Cancel</button>
</form>
